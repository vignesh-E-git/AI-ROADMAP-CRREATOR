<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Roadmap Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <main class="container">
        <header class="header">
            <h1 class="title">Roadmap <span class="gradient-text">Creator</span></h1>
            <p class="subtitle">Generate an AI-powered learning path for any topic under the sun.</p>
        </header>

        <section class="search-section">
            <form id="roadmap-form" class="search-box">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="topic-input" placeholder="What do you want to learn? (e.g. Machine Learning, React Native)" required autocomplete="off">
                <button type="submit" class="generate-btn" id="generate-btn">
                    <span>Generate Path</span>
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                </button>
            </form>
        </section>

        <!-- Loader -->
        <div id="loader" class="loader-container hidden">
            <div class="spinner"></div>
            <p>Crafting your personalized roadmap...</p>
        </div>

        <!-- Roadmap Content -->
        <section id="roadmap-container" class="roadmap-container hidden">
            <h2 class="roadmap-title" id="display-topic">Your Roadmap</h2>
            <div class="timeline" id="timeline">
                <!-- Timeline items will be injected here -->
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
